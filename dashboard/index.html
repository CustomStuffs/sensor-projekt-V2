<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensor Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header>
    <h1>Sensor Hub</h1>
    <div id="device-bar">
      <label for="device-select">Device:</label>
      <select id="device-select"><option value="">Loading…</option></select>
      <span id="last-seen"></span>
    </div>
  </header>

  <div id="error-banner"></div>

  <main>
    <section id="chart-section">
      <div id="sensor-toggles">
        <label><input type="checkbox" data-sensor="temp_c"       checked /> Temperature</label>
        <label><input type="checkbox" data-sensor="humidity_pct" checked /> Humidity</label>
        <label><input type="checkbox" data-sensor="ph"                   /> pH</label>
        <label><input type="checkbox" data-sensor="ec_us"                /> EC</label>
        <label><input type="checkbox" data-sensor="lux"                  /> Light</label>
        <label><input type="checkbox" data-sensor="soil_pct"    checked  /> Soil</label>
        <label><input type="checkbox" data-sensor="water_level" checked  /> Water Level</label>
      </div>
      <div id="time-range">
        <button data-hours="6">6 h</button>
        <button data-hours="24" class="active">24 h</button>
        <button data-hours="168">7 d</button>
      </div>
      <canvas id="sensor-chart"></canvas>
    </section>

    <section id="relay-section">
      <h2>Relay</h2>

      <div id="manual-override">
        <h3>Manual Override</h3>
        <div id="relay-controls">
          <button id="btn-relay-on">ON</button>
          <button id="btn-relay-off">OFF</button>
          <input type="number" id="relay-duration" value="300" min="1" max="600" />
          <label for="relay-duration">seconds</label>
        </div>
      </div>

      <div id="schedule-editor">
        <h3>Daily Schedule</h3>
        <table id="schedule-table">
          <thead>
            <tr><th>Time</th><th>Duration</th><th>Days</th><th>Skip if</th><th></th></tr>
          </thead>
          <tbody id="schedule-rows"></tbody>
        </table>

        <div id="add-slot-form">
          <div class="form-row">
            <label>Time <input type="time" id="slot-time" value="08:00" /></label>
            <label>Duration <input type="number" id="slot-duration" value="10" min="1" max="120" /> min</label>
          </div>
          <div class="form-row">
            <span class="form-label">Days:</span>
            <label class="day-label"><input type="checkbox" class="day-checkbox" value="mon" checked /> Mon</label>
            <label class="day-label"><input type="checkbox" class="day-checkbox" value="tue" checked /> Tue</label>
            <label class="day-label"><input type="checkbox" class="day-checkbox" value="wed" checked /> Wed</label>
            <label class="day-label"><input type="checkbox" class="day-checkbox" value="thu" checked /> Thu</label>
            <label class="day-label"><input type="checkbox" class="day-checkbox" value="fri" checked /> Fri</label>
            <label class="day-label"><input type="checkbox" class="day-checkbox" value="sat" checked /> Sat</label>
            <label class="day-label"><input type="checkbox" class="day-checkbox" value="sun" checked /> Sun</label>
          </div>
          <div class="form-row">
            <span class="form-label">Skip if:</span>
            <select id="slot-condition">
              <option value="none">No condition</option>
              <option value="soil">Soil moisture ≥</option>
              <option value="no_water">No water in tank</option>
            </select>
            <input type="number" id="slot-condition-value" value="60" min="0" max="100" class="hidden" />
            <span id="slot-condition-unit" class="hidden">%</span>
          </div>
          <button id="btn-add-slot">+ Add Slot</button>
        </div>

        <div class="schedule-footer">
          <div id="schedule-status"></div>
          <button id="btn-save-schedule">Save Schedule</button>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
